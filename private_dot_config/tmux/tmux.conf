# Settings
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g update-environment "DISPLAY WAYLAND_DISPLAY XAUTHORITY SSH_AUTH_SOCK"
set -g allow-passthrough all
bind r source-file ~/.config/tmux/tmux.conf

set -g set-titles on
set -g set-titles-string '#S[#I]: #W'

# Sessions
bind C-o display-popup -B -E "
    tmux list-sessions -F '#{session_activity} #{session_name}' | sort -nr | cut -d' ' -f2- | tail -n +2 |
    fzf --prompt='Sessions: ' \
        --no-sort \
        --reverse \
        --header='Available Sessions:' \
        --height=100% \
        --border \
        --border=rounded \
        --border-label=' Switch Tmux Session ' \
        --color=label:italic:black |
    xargs -r tmux switch-client -t
"
bind C-n display-popup -B -E "tmux-sessionizer.sh"

# Windows
set-option -g renumber-windows on

# Pane movement
bind -n C-h select-pane -L 
bind -n C-j select-pane -D 
bind -n C-k select-pane -U 
bind -n C-l select-pane -R 
bind C-l send-keys 'C-l'

# Copy
setw -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi V send -X select-line
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel

# Color
set -g default-terminal "tmux-256color"
set-option -a terminal-features "*-256color:RGB"

# Status bar
set-option -g status-position top
set -g @catppuccin_status_background "default"
set -g @catppuccin_flavor 'frappe'
set -g @catppuccin_window_status_style 'rounded'

run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux # git clone -b v2.3.0 https://github.com/catppuccin/tmux.git $XDG_CONFIG_HOME/tmux/plugins/catppuccin/tmux
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -ag status-left "#{E:@catppuccin_status_session}"
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_date_time}"
set -g @catppuccin_window_default_text " #W"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_window_text " #W"
# set -g status-right-length 100

# TPM
# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
# set -g @plugin 'tmux-plugins/tmux-resurrect'
# set -g @plugin 'tmux-plugins/tmux-continuum'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm' # git clone https://github.com/tmux-plugins/tpm $XDG_CONFIG_HOME/.tmux/plugins/tpm
